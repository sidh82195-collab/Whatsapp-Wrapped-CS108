<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WhatsApp Wrapped 2026</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

  <!-- progress bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- nav arrows -->
  <button class="nav-btn left" id="prevBtn" onclick="prevSlide()">&#8592;</button>
  <button class="nav-btn right" id="nextBtn" onclick="nextSlide()">&#8594;</button>

  <!-- slide counter -->
  <div class="slide-counter" id="slideCounter"></div>

  <!-- slides container -->
  <div class="slides-wrapper" id="slidesWrapper"></div>

  <script src="app.js"></script>
</body>
</html>
